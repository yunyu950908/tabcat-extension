name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Build Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release
        id: release
        run: pnpm release:prepare-artifact

      - name: Compile
        if: steps.release.outputs.should_release == 'true'
        run: pnpm compile

      - name: Test
        if: steps.release.outputs.should_release == 'true'
        run: pnpm test

      - name: Build
        if: steps.release.outputs.should_release == 'true'
        run: pnpm build

      - name: Check built version
        if: steps.release.outputs.should_release == 'true'
        run: pnpm check:built-version

      - name: Package
        if: steps.release.outputs.should_release == 'true'
        run: pnpm zip

      - name: Collect release asset
        if: steps.release.outputs.should_release == 'true'
        run: |
          mkdir -p release-assets
          cp .output/*.zip release-assets/

      - name: Create or update GitHub Release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber
          elif git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" release-assets/*.zip \
              --title "$RELEASE_TAG" \
              --notes "TabCat $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes "TabCat $RELEASE_TAG"
          fi
